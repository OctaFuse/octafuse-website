# 可选：通过 Wrangler 将 dist/ 推到 Cloudflare Pages（手动触发）。
# 若已在 Cloudflare Dashboard 关联本仓库做 Git 集成构建，请勿同时启用自动推送类部署，以免重复发布。
# 本工作流仅在 octafuse-website 生效，不会触发 octafuse-gateway 的流水线。
name: Pages deploy (Wrangler)

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: Cloudflare Pages 项目名称（与 Dashboard 中一致）
        required: false
        default: octafuse-website
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ inputs.project_name }}
